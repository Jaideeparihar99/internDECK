<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#185FA5" />
    <title>CampusConnect</title>
    <script type="text/javascript">
      // GitHub Pages SPA redirect.
      // This sends all 404s to /?/<path> so index.html can restore the route.
      (function (l) {
        var path = l.pathname;
        var search = l.search ? l.search.slice(1).replace(/&/g, '~and~') : '';
        var hash = l.hash || '';
        var redirect = '/?/' + path.slice(1) + (search ? '&' + search : '') + hash;
        l.replace(l.protocol + '//' + l.host + redirect);
      })(window.location);
    </script>
  </head>
  <body></body>
</html>
